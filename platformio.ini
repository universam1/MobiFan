[platformio]
default_envs = esp32c3-oled-ds18b20

[env:esp32c3-oled]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    olikraus/U8g2@^2.35.30

; Alternate temp sensor: DS18B20 instead of the onboard NTC divider (see
; docs/temp-sensor.md). Build/upload with:
;   pio run -e esp32c3-oled-ds18b20
;   pio run -e esp32c3-oled-ds18b20 -t upload
[env:esp32c3-oled-ds18b20]
extends = env:esp32c3-oled
build_flags =
    ${env:esp32c3-oled.build_flags}
    -DTEMP_SENSOR_DS18B20
lib_deps =
    ${env:esp32c3-oled.lib_deps}
    paulstoffregen/OneWire@^2.3.7

; add a test program to check the oled display
; only one file is needed test/main.cpp, exclude the rest
[env:esp32c3-oled-test]
extends = env:esp32c3-oled
build_src_filter =
    -<*>
    +<../test/main.cpp>
lib_deps =
    olikraus/U8g2 @ ^2.35.30
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit BusIO @ ^1.16.1



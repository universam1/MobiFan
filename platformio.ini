[platformio]
default_envs = esp32c3-oled

[env:esp32c3-oled]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    olikraus/U8g2@^2.35.19

; Alternate temp sensor: DS18B20 instead of the onboard NTC divider (see
; docs/temp-sensor.md). Build/upload with:
;   pio run -e esp32c3-oled-ds18b20
;   pio run -e esp32c3-oled-ds18b20 -t upload
[env:esp32c3-oled-ds18b20]
extends = env:esp32c3-oled
build_flags =
    ${env:esp32c3-oled.build_flags}
    -DTEMP_SENSOR_DS18B20
lib_deps =
    ${env:esp32c3-oled.lib_deps}
    milesburton/DallasTemperature@^3.9.1
    paulstoffregen/OneWire@^2.3.7
